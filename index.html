<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rudi's Routes" />
  <title>Rudi's Bakery — Route Planner</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --border: #2d2d4a;
      --accent: #e8b84b;
      --accent2: #f4d03f;
      --text: #f0f0f5;
      --text-muted: #8888aa;
      --green: #2ecc71;
      --orange: #f39c12;
      --red: #e74c3c;
      --blue: #3498db;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .date-badge {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ── ROUTE SELECTOR ── */
    .route-section {
      margin-bottom: 24px;
    }

    .section-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .route-select {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      padding: 14px 16px;
      appearance: none;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .route-select:focus {
      border-color: var(--accent);
    }

    /* ── SUMMARY CARDS ── */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }

    .summary-card .card-value {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .summary-card .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ── STORE CARDS ── */
    .store-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .store-card:active {
      border-color: var(--accent);
    }

    .store-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .store-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .store-number {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      min-width: 56px;
      text-align: center;
    }

    .store-info h3 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .store-info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .store-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .total-units {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .total-units span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .chevron {
      color: var(--text-muted);
      font-size: 16px;
      transition: transform 0.2s;
    }

    .store-card.open .chevron {
      transform: rotate(180deg);
    }

    /* ── PRODUCT ROWS ── */
    .product-list {
      display: none;
      border-top: 1px solid var(--border);
    }

    .store-card.open .product-list {
      display: block;
    }

    .product-row {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .product-row:last-child {
      border-bottom: none;
    }

    .product-left {
      flex: 1;
    }

    .product-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .product-upc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: monospace;
    }

    .product-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .confidence-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .confidence-high {
      background: rgba(46, 204, 113, 0.15);
      color: var(--green);
      border: 1px solid rgba(46, 204, 113, 0.3);
    }

    .confidence-medium {
      background: rgba(243, 156, 18, 0.15);
      color: var(--orange);
      border: 1px solid rgba(243, 156, 18, 0.3);
    }

    .confidence-low {
      background: rgba(231, 76, 60, 0.15);
      color: var(--red);
      border: 1px solid rgba(231, 76, 60, 0.3);
    }

    .qty-bubble {
      background: var(--accent);
      color: #0f0f1a;
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .action-reduce { background: var(--red); }
    .action-maintain { background: var(--green); }
    .action-increase { background: var(--blue); }

    /* ── LOADING / EMPTY STATES ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .state-box .state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .state-box h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .state-box p {
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── LEGEND ── */
    .legend {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .legend-title {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── SEARCH ── */
    .search-box {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .search-box:focus {
      border-color: var(--accent);
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    /* ── INSTALL BANNER ── */
    .install-banner {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0f0f1a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .install-banner-text {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
    }

    .install-banner-sub {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 2px;
    }

    .install-btn {
      background: #0f0f1a;
      color: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .footer strong {
      color: var(--accent);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-icon">🍞</div>
    <h1>Rudi's <span>Routes</span></h1>
  </div>
  <div class="date-badge" id="today-date"></div>
</div>

<div class="container">

  <div id="install-banner" class="install-banner" style="display:none" onclick="installApp()">
    <div>
      <div class="install-banner-text">Add to Home Screen</div>
      <div class="install-banner-sub">Quick access from your phone</div>
    </div>
    <button class="install-btn">Install</button>
  </div>

  <div class="route-section">
    <div class="section-label">Select Your Route</div>
    <select class="route-select" id="route-select" onchange="filterRoute()">
      <option value="">— Choose a route —</option>
    </select>
  </div>

  <div id="legend" class="legend" style="display:none">
    <div class="legend-title">Guide</div>
    <div class="legend-items">
      <div class="legend-item"><div class="action-dot action-maintain"></div> Maintain drop</div>
      <div class="legend-item"><div class="action-dot action-reduce"></div> Reduce drop</div>
      <div class="legend-item"><div class="action-dot action-increase"></div> Increase drop</div>
      <div class="legend-item"><span class="confidence-badge confidence-high">High</span> Confident</div>
      <div class="legend-item"><span class="confidence-badge confidence-low">Low</span> Use judgment</div>
    </div>
  </div>

  <div id="summary-cards" class="summary-cards" style="display:none">
    <div class="summary-card">
      <div class="card-value" id="card-stores">—</div>
      <div class="card-label">Stops</div>
    </div>
    <div class="summary-card">
      <div class="card-value" id="card-skus">—</div>
      <div class="card-label">SKUs</div>
    </div>
    <div class="summary-card">
      <div class="card-value" id="card-units">—</div>
      <div class="card-label">Total Units</div>
    </div>
  </div>

  <input type="search" class="search-box" id="search-box" placeholder="Search store or product..." oninput="renderStores()" style="display:none" />

  <div id="store-list"></div>

  <div class="footer">
    Powered by <strong>Rudi's Bakery</strong> Route Optimization Model<br>
    Updated weekly — last update: <span id="last-update">—</span>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
// Point this to your raw CSV on GitHub after upload
const CSV_URL = 'recommendations.csv';

// Product name lookup (UPC -> readable name)
// This gets populated from the CSV descrip column if available
const PRODUCT_NAMES = {};

// ── STATE ────────────────────────────────────────────────────
let allData = [];
let selectedRoute = '';

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setDate();
  loadData();
  setupInstallPrompt();
});

function setDate() {
  const now = new Date();
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', opts).toUpperCase();
  document.getElementById('last-update').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── LOAD CSV ─────────────────────────────────────────────────
async function loadData() {
  const list = document.getElementById('store-list');
  list.innerHTML = `
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <h3>Loading recommendations...</h3>
      <p>Fetching the latest delivery data</p>
    </div>`;

  try {
    const res = await fetch(CSV_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('CSV not found');
    const text = await res.text();
    allData = parseCSV(text);

    if (allData.length === 0) throw new Error('No data');

    populateRoutes();
    list.innerHTML = `
      <div class="state-box">
        <div class="state-icon">👆</div>
        <h3>Select your route above</h3>
        <p>${allData.length} recommendations loaded across ${[...new Set(allData.map(r => r.route))].length} routes</p>
      </div>`;
  } catch (e) {
    list.innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <h3>Could not load data</h3>
        <p>Make sure recommendations.csv is uploaded to the repository.<br><br>Error: ${e.message}</p>
      </div>`;
  }
}

// ── PARSE CSV ────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/"/g, ''));
    const row = {};
    headers.forEach((h, i) => row[h] = vals[i] || '');
    return row;
  }).filter(r => r.route || r.Route);
}

// ── POPULATE ROUTES ──────────────────────────────────────────
function populateRoutes() {
  const sel = document.getElementById('route-select');
  
  // Handle both capitalized and lowercase column names
  const routeKey = allData[0].hasOwnProperty('Route') ? 'Route' : 'route';
  const routes = [...new Set(allData.map(r => r[routeKey]))].sort();
  
  routes.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r;
    sel.appendChild(opt);
  });
}

// ── FILTER BY ROUTE ──────────────────────────────────────────
function filterRoute() {
  selectedRoute = document.getElementById('route-select').value;
  
  if (!selectedRoute) {
    document.getElementById('summary-cards').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
    document.getElementById('search-box').style.display = 'none';
    document.getElementById('store-list').innerHTML = `
      <div class="state-box">
        <div class="state-icon">👆</div>
        <h3>Select your route above</h3>
      </div>`;
    return;
  }

  document.getElementById('summary-cards').style.display = 'grid';
  document.getElementById('legend').style.display = 'block';
  document.getElementById('search-box').style.display = 'block';
  document.getElementById('search-box').value = '';
  renderStores();
}

// ── RENDER STORES ────────────────────────────────────────────
function renderStores() {
  const routeKey = allData[0].hasOwnProperty('Route') ? 'Route' : 'route';
  const storeKey = allData[0].hasOwnProperty('Store') ? 'Store' : 'store';
  const cityKey = allData[0].hasOwnProperty('City') ? 'City' : 'SHIPCITY';
  const productKey = allData[0].hasOwnProperty('Product') ? 'Product' : 'descrip';
  const qtyKey = allData[0].hasOwnProperty('Recommended Qty') ? 'Recommended Qty' : 'optimal_units';
  const demandKey = allData[0].hasOwnProperty('Predicted Demand') ? 'Predicted Demand' : 'pred_demand';
  const confidenceKey = allData[0].hasOwnProperty('Confidence') ? 'Confidence' : null;
  const actionKey = allData[0].hasOwnProperty('Action') ? 'Action' : null;
  const returnRateKey = allData[0].hasOwnProperty('Return Rate') ? 'Return Rate' : null;

  const searchTerm = document.getElementById('search-box').value.toLowerCase();
  
  let filtered = allData.filter(r => r[routeKey] === selectedRoute);
  
  if (searchTerm) {
    filtered = filtered.filter(r =>
      String(r[storeKey]).toLowerCase().includes(searchTerm) ||
      String(r[productKey] || r.product || '').toLowerCase().includes(searchTerm) ||
      String(r[cityKey] || '').toLowerCase().includes(searchTerm)
    );
  }

  // Group by store
  const stores = {};
  filtered.forEach(r => {
    const sid = r[storeKey];
    if (!stores[sid]) stores[sid] = { info: r, products: [] };
    stores[sid].products.push(r);
  });

  // Summary cards
  const totalUnits = filtered.reduce((sum, r) => sum + (parseFloat(r[qtyKey]) || 0), 0);
  document.getElementById('card-stores').textContent = Object.keys(stores).length;
  document.getElementById('card-skus').textContent = filtered.length;
  document.getElementById('card-units').textContent = Math.round(totalUnits);

  // Render
  const list = document.getElementById('store-list');
  if (Object.keys(stores).length === 0) {
    list.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><h3>No results</h3><p>Try a different search term</p></div>`;
    return;
  }

  list.innerHTML = Object.entries(stores).map(([storeId, data]) => {
    const storeTotal = data.products.reduce((sum, r) => sum + (parseFloat(r[qtyKey]) || 0), 0);
    const city = data.info[cityKey] || '';

    const productRows = data.products.map(r => {
      const qty = Math.round(parseFloat(r[qtyKey]) || 0);
      const productName = r[productKey] || r.product || r.descrip || 'Unknown Product';
      const upc = r.product || r.Item || '';
      
      // Confidence
      let confClass = 'confidence-high';
      let confLabel = 'High';
      if (confidenceKey && r[confidenceKey]) {
        const c = r[confidenceKey].toLowerCase();
        if (c.includes('low')) { confClass = 'confidence-low'; confLabel = 'Low'; }
        else if (c.includes('moderate') || c.includes('medium')) { confClass = 'confidence-medium'; confLabel = 'Med'; }
      } else if (returnRateKey && r[returnRateKey]) {
        const rate = parseFloat(r[returnRateKey]);
        if (rate > 0.30) { confClass = 'confidence-low'; confLabel = 'Low'; }
        else if (rate > 0.20) { confClass = 'confidence-medium'; confLabel = 'Med'; }
      }

      // Action
      let actionClass = 'action-maintain';
      if (actionKey && r[actionKey]) {
        const a = r[actionKey].toLowerCase();
        if (a.includes('reduce')) actionClass = 'action-reduce';
        else if (a.includes('increase')) actionClass = 'action-increase';
      }

      return `
        <div class="product-row">
          <div class="product-left">
            <div class="product-name">${productName}</div>
            ${upc && upc !== productName ? `<div class="product-upc">${upc}</div>` : ''}
          </div>
          <div class="product-right">
            <span class="confidence-badge ${confClass}">${confLabel}</span>
            <div class="qty-bubble">${qty}</div>
            <div class="action-dot ${actionClass}"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="store-card" id="store-${storeId}">
        <div class="store-header" onclick="toggleStore('store-${storeId}')">
          <div class="store-header-left">
            <div class="store-number">#${storeId}</div>
            <div class="store-info">
              <h3>Store ${storeId}</h3>
              ${city ? `<p>${city}</p>` : ''}
            </div>
          </div>
          <div class="store-header-right">
            <div class="total-units">${Math.round(storeTotal)}<span> units</span></div>
            <div class="chevron">▼</div>
          </div>
        </div>
        <div class="product-list">${productRows}</div>
      </div>`;
  }).join('');
}

// ── TOGGLE STORE ─────────────────────────────────────────────
function toggleStore(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

// ── PWA INSTALL ──────────────────────────────────────────────
let deferredPrompt;

function setupInstallPrompt() {
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
  });
}

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
}
</script>
</body>
</html>
